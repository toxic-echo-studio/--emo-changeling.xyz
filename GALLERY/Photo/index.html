        {
          "@context": "https://schema.org",
          "@type": "CollectionPage",
          "name": "Photo – Gallery",
          "url": "https://gallery.emo-changeling.xyz/Photo/",
          "isPartOf": { "@id": "https://gallery.emo-changeling.xyz/#webpage" },
          "description": "Kolekcja 'gołębich artów' - cyfrowych przeróbek w estetyce projektu.",
          "breadcrumb": {
            "@type": "BreadcrumbList",
            "itemListElement": [
              {
                "@type": "ListItem",
                "position": 1,
                "name": "Gallery",
                "item": "https://gallery.emo-changeling.xyz/"
              },
              {
                "@type": "ListItem",
                "position": 2,
                "name": "Photo",
                "item": "https://gallery.emo-changeling.xyz/Photo/"
              }
            ]
          }
        }
    </script>
</head>
<body>

    <header class="main-header">
        <div class="banner-container">
            <img src="/img/bannerM1.webp" width="1920" height="1080" alt="Baner" class="banner" fetchpriority="high">
            <a href="/" class="myspace-hitbox-link" aria-label="Wróć do głównej strony galerii">
                <img src="/img/emo1ss.webp" width="288" height="288" alt="Wróć" class="sliding-emo-pic">
            </a>
        </div>
    </header>

    <main class="content-wrapper" style="text-align: center;">
        <h1 class="glitch" data-text="Photo">Photo</h1>

        <div class="content-box" style="margin-bottom: 30px;">
            <p>Pigeon Boys w akcji. Kolekcja cyfrowych alter-ego. Kliknij w grafę, żeby rozwinąć pełen obraz i ukryty opis.</p>
        </div>

        <div class="gallery-grid" id="gallery-grid"></div>

        <a href="/" class="main-menu-btn" aria-label="Wróć do wyboru galerii">
            ❮ WRÓĆ DO GALERII
        </a>
    </main>

    <div class="gallery-modal" id="gallery-modal">
        <div class="modal-close" id="modal-close" aria-label="Zamknij podgląd">✖</div>

        <div class="modal-content">
            <div class="modal-image-container">
                <img src="" alt="Pełny podgląd" class="modal-image" id="modal-image">
                <button class="modal-rotate-btn" id="modal-rotate-btn">Obróć</button>
            </div>

            <div class="modal-description">
                <details id="modal-details">
                    <summary>❯ ROZWIŃ OPIS</summary>
                    <div class="description-content" id="description-content">
                        <span class="blink">Wczytywanie danych...</span>
                    </div>
                </details>
            </div>
        </div>
    </div>

    <script>
        // Konfiguracja plików.
        // thumb: plik miniatury (nie wpychaj tu plików po 5MB)
        // full: plik w wysokiej rozdzielczości
        // title: krótki tekst (do 20 znaków) na hover
        // descUrl: ścieżka do pliku HTML z rozbudowanym opisem
        const galleryData = [
            {
                id: 1,
                thumb: '/Grafics/Photo/1/thumb.webp',
                full: '/Grafics/Photo/1/full.webp',
                title: 'Gołąb #01: Start',
                descUrl: '/Grafics/Photo/1/opis.html'
            },
            {
                id: 2,
                thumb: '/Grafics/Photo/2/thumb.webp',
                full: '/Grafics/Photo/2/full.webp',
                title: 'Gołąb #02: Neon',
                descUrl: '/Grafics/Photo/2/opis.html'
            }
            // Tutaj dorzucasz kolejne obiekty
        ];

        const grid = document.getElementById('gallery-grid');
        const modal = document.getElementById('gallery-modal');
        const modalImg = document.getElementById('modal-image');
        const modalClose = document.getElementById('modal-close');
        const descContent = document.getElementById('description-content');
        const modalDetails = document.getElementById('modal-details');
        const rotateBtn = document.getElementById('modal-rotate-btn');
        const imgContainer = document.querySelector('.modal-image-container');

        // Renderowanie miniatur
        galleryData.forEach(item => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'gallery-item';

            itemDiv.innerHTML = `
                <img src="${item.thumb}" alt="${item.title}" loading="lazy">
                <div class="gallery-item-overlay">${item.title}</div>
            `;

            itemDiv.addEventListener('click', () => openModal(item));
            grid.appendChild(itemDiv);
        });

        // Otwieranie Modala i Fetchowanie HTML
        async function openModal(item) {
            modal.classList.add('active');
            modalImg.src = item.full;
            modalImg.alt = item.title;

            // Zwijamy details i czyścimy stary kontent na czas ładowania
            modalDetails.removeAttribute('open');
            descContent.innerHTML = '<span class="blink">Wczytywanie danych z serwera...</span>';
            imgContainer.classList.remove('rotate-mobile');

            try {
                const response = await fetch(item.descUrl);
                if (!response.ok) throw new Error('Nie znaleziono pliku opisu.');
                const htmlData = await response.text();

                // Wstrzykujemy czysty HTML z pliku
                descContent.innerHTML = htmlData;
            } catch (error) {
                descContent.innerHTML = `<span style="color: red;">[ERROR] Błąd wczytywania: ${error.message}</span>`;
            }
        }

        // Zamykanie modala
        modalClose.addEventListener('click', () => {
            modal.classList.remove('active');
            modalImg.src = ''; // zwalnia pamięć po zamknięciu
        });

        // Obracanie zdjęcia na mobilkach (funkcja z Twojego CSS)
        rotateBtn.addEventListener('click', () => {
            imgContainer.classList.toggle('rotate-mobile');
        });

        // Zamknięcie modala po kliknięciu poza obrazek i opis
        modal.addEventListener('click', (e) => {
            if (e.target === modal || e.target.classList.contains('modal-content')) {
                modal.classList.remove('active');
            }
        });

        console.log("%c Photo Initialized - RAWR XD ", "color: #00ff00; background: #000; font-family: monospace; border: 1px solid #ff007f;");
    </script>
</body>
</html>
