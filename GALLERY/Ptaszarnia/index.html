          "@context": "https://schema.org",

          "breadcrumb": {
            "@type": "BreadcrumbList",
            "itemListElement": [
              {

                "position": 1,
                "name": "Gallery",

              },
              {
                "@type": "ListItem",

<body>

    <header class="main-header">
        <div class="banner-container">
            <img src="/img/bannerM1.webp" width="1920" height="1080" alt="Baner" class="banner" fetchpriority="high">
            <a href="/" class="myspace-hitbox-link" aria-label="Wróć do głównej strony galerii">
                <img src="/img/emo1ss.webp" width="288" height="288" alt="Wróć" class="sliding-emo-pic">
            </a>
            <a href="/" class="myspace-hitbox-link-right" aria-label="Wróć do głównej strony galerii">
                <img src="/img/ptaszarnia.webp" width="288" height="288" alt="Wróć" class="sliding-ptaszarnia-pic">
            </a>
        </div>
    </header>

    <main class="content-wrapper" style="text-align: center;">
        <h1 class="glitch" data-text="PTASZARNIA">PTASZARNIA</h1>

        <div class="content-box" style="margin-bottom: 30px;">
            <p>Pigeon Guy w akcji. Kolekcja cyfrowych alter-ego. Kliknij w grafę, żeby rozwinąć pełen obraz i ukryty opis.</p>
        </div>

        <div class="gallery-grid" id="gallery-grid"></div>

        <a href="/" class="main-menu-btn" aria-label="Wróć do wyboru galerii">
            ❮ WRÓĆ DO GALERII
        </a>
    </main>

    <div class="gallery-modal" id="gallery-modal">
        <button class="modal-close" id="modal-close" aria-label="Zamknij podgląd">✖</button>

        <div class="modal-content">
            <div class="modal-image-container">
                <img src="" alt="Pełny podgląd" class="modal-image" id="modal-image">
            </div>

            <div class="modal-description">
                <details id="modal-details">
                    <summary>❯ ROZWIŃ OPIS</summary>
                    <div class="description-content" id="description-content">
                        <span class="blink">Wczytywanie danych...</span>
                    </div>
                </details>
                <a href="" id="modal-download-btn" class="main-menu-btn" download style="display: none; margin-top: 15px; width: 100%; box-sizing: border-box; text-align: center;">DOWNLOAD MAX QUALITY (.TIF)</a>
            </div>
        </div>
    </div>

    <script>
        const galleryData = [
            {
                id: 'nokill',
                thumb: '/Grafics/ptaszarnia/2/thumb.webp',
                title: 'Nokill',
                link: 'Nokill/'
            },
            {
                id: 4,
                thumb: '/Grafics/ptaszarnia/4/thumb.webp',
                full: '/Grafics/ptaszarnia/4/full.webp',
                title: 'Gołąb #04: Gerard Way',
                descUrl: '/Grafics/ptaszarnia/4/opis.html',
                download_tif: '/Grafics/ptaszarnia/4/original.tif'
            },
            {
                id: 5,
                thumb: '/Grafics/ptaszarnia/5/thumb.webp',
                full: '/Grafics/ptaszarnia/5/full.webp',
                title: 'Gołąb #05: Evan (TX2)',
                descUrl: '/Grafics/ptaszarnia/5/opis.html',
                download_tif: '/Grafics/ptaszarnia/5/original.tif'
            },
            {
                id: 6,
                thumb: '/Grafics/ptaszarnia/6/thumb.webp',
                full: '/Grafics/ptaszarnia/6/full.webp',
                title: 'Gołąb #06: TX2 V1',
                descUrl: '/Grafics/ptaszarnia/6/opis.html',
                download_tif: '/Grafics/ptaszarnia/6/original.tif'
            },
            {
                id: 7,
                thumb: '/Grafics/ptaszarnia/7/thumb.webp',
                full: '/Grafics/ptaszarnia/7/full.webp',
                title: 'Gołąb #07: TX2 V2',
                descUrl: '/Grafics/ptaszarnia/7/opis.html',
                download_tif: '/Grafics/ptaszarnia/7/original.tif'
            },
            {
                id: 8,
                thumb: '/Grafics/ptaszarnia/8/thumb.webp',
                full: '/Grafics/ptaszarnia/8/full.webp',
                title: 'Gołąb #08: Матвей',
                descUrl: '/Grafics/ptaszarnia/8/opis.html',
                download_tif: '/Grafics/ptaszarnia/8/original.tif'
            }
        ];

        const grid = document.getElementById('gallery-grid');
        const modal = document.getElementById('gallery-modal');
        const modalImg = document.getElementById('modal-image');
        const descContent = document.getElementById('description-content');
        const modalDetails = document.getElementById('modal-details');
        const downloadBtn = document.getElementById('modal-download-btn');
        const rotateBtn = document.getElementById('modal-rotate-btn');
        const modalContent = document.querySelector('.modal-content');

        // Renderowanie miniatur
        galleryData.forEach(item => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'gallery-card';

            // Czyszczenie nazwy z prefiksu np. "Gołąb #01: "
            const cleanTitle = item.title.replace(/^Gołąb\s+#\d+:\s*/i, '');
            const isCyrillic = /[\u0400-\u04FF]/.test(cleanTitle);

            cardDiv.innerHTML = `
                <div class="gallery-item">
                    <img src="${item.thumb}" alt="${cleanTitle}" loading="lazy">
                </div>
                <div class="gallery-item-caption"${isCyrillic ? ' lang="ru"' : ''}>${cleanTitle}</div>
            `;

            cardDiv.addEventListener('click', () => {
                if (item.link) {
                    window.location.href = item.link;
                } else {
                    openModal(item);
                }
            });
            grid.appendChild(cardDiv);
        });

        // Otwieranie Modala i Fetchowanie HTML
        async function openModal(item) {
            modal.classList.add('active');
            modalImg.src = item.full;
            modalImg.alt = item.title;

            // Zwijamy details, resetujemy obrót układu i czyścimy stary kontent
            modalDetails.removeAttribute('open');
            modalContent.classList.remove('rotated');
            descContent.innerHTML = '<span class="blink">Wczytywanie danych z serwera...</span>';

            // Ustawienie przycisku download
            if (item.download_tif) {
                downloadBtn.href = item.download_tif;
                downloadBtn.style.display = 'inline-block';
            } else {
                downloadBtn.style.display = 'none';
            }

            try {
                const response = await fetch(item.descUrl);
                if (!response.ok) throw new Error('Nie znaleziono pliku opisu (404).');

                const htmlData = await response.text();

                // ZABEZPIECZENIE przed podmianą na stronę główną
                if (htmlData.includes('id="gallery-grid"') || htmlData.includes('data-system="Toxic Echo Studio"')) {
                    throw new Error('Serwer zwrócił stronę główną zamiast pliku opisu. Sprawdź ścieżkę!');
                }

                descContent.innerHTML = htmlData;
            } catch (error) {
                descContent.innerHTML = `<span style="color: #ff0000; font-weight: bold;">[ERROR] Błąd wczytywania opisu:<br>${error.message}</span>`;
            }
        }

        // Obracanie układu na mobilkach
        if (rotateBtn) {
            rotateBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // Żeby kliknięcie w przycisk nie zamykało modala
                modalContent.classList.toggle('rotated');
            });
        }

        // Funkcja zamykająca modal
        function closeModal() {
            modal.classList.remove('active');
            modalImg.src = '';
            modalContent.classList.remove('rotated');
            downloadBtn.style.display = 'none';
            downloadBtn.href = '';
        }

        const modalCloseBtn = document.getElementById('modal-close');
        if (modalCloseBtn) {
            modalCloseBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation(); // Ten knebel ratuje sytuację
                closeModal();
            });
        }

        // Zamknięcie modala po kliknięciu poza obrazek (w tło)
        modal.addEventListener('click', (e) => {
            if (e.target === modal || e.target.classList.contains('modal-content')) {
                closeModal();
            }
        });

        console.log("%c Ptaszarnia Initialized - RAWR XD ", "color: #00ff00; background: #000; font-family: monospace; border: 1px solid #ff007f;");
    </script>
</body>
</html>
