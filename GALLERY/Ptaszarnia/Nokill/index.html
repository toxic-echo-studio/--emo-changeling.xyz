                <a href="" id="modal-download-btn" class="main-menu-btn" download style="display: none; margin-top: 15px; width: 100%; box-sizing: border-box; text-align: center;">DOWNLOAD MAX QUALITY (.TIF)</a>
            </div>
        </div>

    <script>
        const galleryData = [
            {
                id: 1,
                thumb: '/Grafics/ptaszarnia/1/thumb.webp',
                full: '/Grafics/ptaszarnia/1/full.webp',
                title: 'Gołąb #01: Nokill blue',
                descUrl: '/Grafics/ptaszarnia/1/opis.html',
                download_tif: '/Grafics/ptaszarnia/1/original.tif'
            },
            {
                id: 2,
                thumb: '/Grafics/ptaszarnia/2/thumb.webp',
                full: '/Grafics/ptaszarnia/2/full.webp',
                title: 'Gołąb #02: Nokill red',
                descUrl: '/Grafics/ptaszarnia/2/opis.html',
                download_tif: '/Grafics/ptaszarnia/2/original.tif'
            },
            {
                id: 3,
                thumb: '/Grafics/ptaszarnia/3/thumb.webp',
                full: '/Grafics/ptaszarnia/3/full.webp',
                title: 'Gołąb #03: Nokill yellow',
                descUrl: '/Grafics/ptaszarnia/3/opis.html',
                download_tif: '/Grafics/ptaszarnia/3/original.tif'
            }
        ];

        const grid = document.getElementById('gallery-grid');
        const modal = document.getElementById('gallery-modal');
        const modalImg = document.getElementById('modal-image');
        const descContent = document.getElementById('description-content');
        const modalDetails = document.getElementById('modal-details');
        const downloadBtn = document.getElementById('modal-download-btn');
        const rotateBtn = document.getElementById('modal-rotate-btn');
        const modalContent = document.querySelector('.modal-content');

        // Helper to check and convert HEIC images
        async function checkAndConvertHeic(imgElement) {
            const src = imgElement.getAttribute('src');
            if (src && (src.toLowerCase().endsWith('.heic') || src.toLowerCase().endsWith('.heif'))) {
                try {
                    if (imgElement.dataset.heicConverted) {
                        imgElement.src = imgElement.dataset.heicConverted;
                        return;
                    }
                    imgElement.style.opacity = '0.5';
                    const response = await fetch(src);
                    if (!response.ok) throw new Error('Failed to fetch HEIC image');
                    const blob = await response.blob();
                    if (typeof heic2any !== 'undefined') {
                        const convertedBlob = await heic2any({
                            blob: blob,
                            toType: 'image/jpeg',
                            quality: 0.8
                        });
                        const blobUrl = URL.createObjectURL(convertedBlob);
                        imgElement.src = blobUrl;
                        imgElement.dataset.heicConverted = blobUrl;
                    } else {
                        console.error('heic2any library is not loaded');
                    }
                } catch (e) {
                    console.error('Error converting HEIC image:', e);
                } finally {
                    imgElement.style.opacity = '1';
                }
            }
        }

        // Renderowanie miniatur
        galleryData.forEach(item => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'gallery-card';

            // Czyszczenie nazwy z prefiksu np. "Gołąb #01: "
            const cleanTitle = item.title.replace(/^Gołąb\s+#\d+:\s*/i, '');

            cardDiv.innerHTML = `
                <div class="gallery-item">
                    <img src="${item.thumb}" alt="${cleanTitle}" loading="lazy">
                </div>
                <div class="gallery-item-caption">${cleanTitle}</div>
            `;

            const imgEl = cardDiv.querySelector('img');
            checkAndConvertHeic(imgEl);

            cardDiv.addEventListener('click', () => {
                if (item.link) {
                    window.location.href = item.link;
                } else {
                    openModal(item);
                }
            });
            grid.appendChild(cardDiv);
        });

        // Otwieranie Modala i Fetchowanie HTML
        async function openModal(item) {
            modal.classList.add('active');
            
            // Handle HEIC for modal main image
            if (item.full && (item.full.toLowerCase().endsWith('.heic') || item.full.toLowerCase().endsWith('.heif'))) {
                modalImg.src = '';
                modalImg.alt = 'Converting HEIC...';
                try {
                    const response = await fetch(item.full);
                    const blob = await response.blob();
                    if (typeof heic2any !== 'undefined') {
                        const convertedBlob = await heic2any({
                            blob: blob,
                            toType: 'image/jpeg',
                            quality: 0.8
                        });
                        const blobUrl = URL.createObjectURL(convertedBlob);
                        modalImg.src = blobUrl;
                        modalImg.alt = item.title;
                    }
                } catch (e) {
                    console.error('Failed to convert modal HEIC image:', e);
                    modalImg.src = item.full;
                    modalImg.alt = item.title;
                }
            } else {
                modalImg.src = item.full;
                modalImg.alt = item.title;
            }

            // Zwijamy details, resetujemy obrót układu i czyścimy stary kontent
            modalDetails.removeAttribute('open');
            modalContent.classList.remove('rotated');
            descContent.innerHTML = '<span class="blink">Wczytywanie danych z serwera...</span>';

            // Ustawienie przycisku download
            if (item.download_tif) {
                downloadBtn.href = item.download_tif;
                downloadBtn.style.display = 'inline-block';
            } else {
                downloadBtn.style.display = 'none';
            }

            try {
                const response = await fetch(item.descUrl);
                if (!response.ok) throw new Error('Nie znaleziono pliku opisu (404).');

                const htmlData = await response.text();

                // ZABEZPIECZENIE przed podmianą na stronę główną
                if (htmlData.includes('id="gallery-grid"') || htmlData.includes('data-system="Toxic Echo Studio"')) {
                    throw new Error('Serwer zwrócił stronę główną zamiast pliku opisu. Sprawdź ścieżkę!');
                }

                descContent.innerHTML = htmlData;
                
                // Convert any HEIC images inside description content
                const descImages = descContent.querySelectorAll('img');
                descImages.forEach(img => checkAndConvertHeic(img));
            } catch (error) {
                descContent.innerHTML = `<span style="color: #ff0000; font-weight: bold;">[ERROR] Błąd wczytywania opisu:<br>${error.message}</span>`;
            }
        }

        // Obracanie układu na mobilkach
        if (rotateBtn) {
            rotateBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // Żeby kliknięcie w przycisk nie zamykało modala
                modalContent.classList.toggle('rotated');
            });
        }

        // Funkcja zamykająca modal
        function closeModal() {
            modal.classList.remove('active');
            modalImg.src = '';
            modalContent.classList.remove('rotated');
            downloadBtn.style.display = 'none';
            downloadBtn.href = '';
        }

        const modalCloseBtn = document.getElementById('modal-close');
        if (modalCloseBtn) {
            modalCloseBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation(); // Ten knebel ratuje sytuację
                closeModal();
            });
        }

        // Zamknięcie modala po kliknięciu poza obrazek (w tło)
        modal.addEventListener('click', (e) => {
            if (e.target === modal || e.target.classList.contains('modal-content')) {
                closeModal();
            }
        });

        console.log("%c Nokill Subgallery Initialized - RAWR XD ", "color: #00ff00; background: #000; font-family: monospace; border: 1px solid #ff007f;");
    </script>
</body>
